<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1> Contact Manager</h1>


    <form id="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="number" id="phone" placeholder="Enter phone number">
      </div>
      <button type="submit" id="submit-btn">Add Contact</button>
    </form>

    <!-- Error message -->
    <p id="error-msg" class="error" hidden>Please fill in all fields.</p>

    <!-- Contact List -->
    <h2>Contact List</h2>
    <div id="contact-list">
      <p id="empty-msg" class="empty">No contacts added yet.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
